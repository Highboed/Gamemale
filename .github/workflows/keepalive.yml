name: 'Keep Repo Alive'

on:
  schedule:
    # 每个月的1号和15号凌晨运行一次 (cron 表达式)
    - cron: '0 0 1,15 * *'
  workflow_dispatch: # 允许你手动点击运行

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Update timestamp file
        run: |
          # 创建或更新一个名为 .keepalive 的隐藏文件，写入当前时间
          echo "Last keepalive run: $(date)" > .keepalive
          
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .keepalive
          # 只有当文件发生变化时才提交，避免报错
          git commit -m "Auto keepalive to prevent action suspension" || exit 0
          git push
